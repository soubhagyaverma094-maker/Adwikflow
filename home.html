<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdwikFlow — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080F;--surface:#0E1020;--card:#131629;--border:rgba(255,255,255,0.08);--accent:#5B5FFF;--accent2:#A259FF;--green:#00E5A0;--red:#FF5C7A;--yellow:#FFB930;--muted:#7B80A8;--text:#E8EAF6;--grad:linear-gradient(135deg,#5B5FFF,#A259FF)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:1rem}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.layout{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;position:fixed;top:0;left:0;bottom:0;z-index:150;display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:.6rem 1.4rem 1.1rem;font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:#fff;border-bottom:1px solid var(--border);margin-bottom:.6rem}
.sb-logo span{color:var(--accent)}
.sb-logo small{display:block;font-family:'Inter',sans-serif;font-size:.68rem;font-weight:400;color:var(--green);margin-top:.2rem}
.nav-sec{padding:.6rem 1.4rem .3rem;font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:.7rem;padding:.62rem 1.4rem;color:var(--muted);font-size:.84rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;position:relative;text-decoration:none}
.nav-item:hover{background:rgba(91,95,255,.07);color:var(--text)}
.nav-item.active{background:rgba(91,95,255,.12);color:#fff}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad)}
.nav-item .ic{font-size:1rem;width:20px;text-align:center}
.nav-item.lockednav{opacity:.5}
.badge-r{margin-left:auto;font-size:.58rem;padding:.1rem .4rem;border-radius:100px;font-weight:700}
.b-live{background:rgba(0,229,160,.15);color:var(--green)}
.b-lock{background:rgba(123,128,168,.15);color:var(--muted)}
.sb-bottom{margin-top:auto;padding:1rem 1.4rem;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:.65rem}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff;flex-shrink:0}
.u-name{font-size:.82rem;font-weight:600;color:#fff}
.u-plan{font-size:.7rem;color:var(--accent)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);width:100%;margin-top:.8rem;padding:.5rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer}
.logout-btn:hover{color:#fff;border-color:var(--red)}
.main{margin-left:230px;flex:1;padding:2rem}
.welcome{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:#fff;margin-bottom:.3rem}
.welcome-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.3rem}
.kpi-lbl{color:var(--muted);font-size:.72rem;font-weight:600;text-transform:uppercase;margin-bottom:.5rem}
.kpi-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#fff}
.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:.2rem}
.sec-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:1rem}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}
.svc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;transition:.22s;position:relative;text-decoration:none;display:block;color:inherit}
.svc-card.unlocked{cursor:pointer}
.svc-card.unlocked:hover{border-color:rgba(91,95,255,.4);transform:translateY(-2px)}
.svc-card.locked{opacity:.62}
.svc-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.9rem}
.svc-nm{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#fff;margin-bottom:.3rem}
.svc-ds{color:var(--muted);font-size:.8rem;line-height:1.5}
.svc-tag{position:absolute;top:1rem;right:1rem;font-size:.6rem;font-weight:700;padding:.15rem .5rem;border-radius:100px;text-transform:uppercase}
.tag-active{background:rgba(0,229,160,.15);color:var(--green)}
.tag-lock{background:rgba(123,128,168,.15);color:var(--muted)}
.svc-go{margin-top:.9rem;font-size:.78rem;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:.3rem}
.svc-lock{margin-top:.9rem;font-size:.78rem;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:.35rem}
.subscribe-btn{margin-top:.7rem;display:inline-block;background:var(--grad);color:#fff;padding:.45rem 1rem;border-radius:8px;font-size:.76rem;font-weight:700;border:none;cursor:pointer}
@media(max-width:900px){.sidebar{width:60px}.sb-logo{font-size:0;padding:1rem}.sb-logo span,.sb-logo small{display:none}.nav-item span:not(.ic):not(.badge-r){display:none}.nav-sec{font-size:0;padding:.4rem}.badge-r{display:none}.main{margin-left:60px;padding:1.2rem}.u-name,.u-plan{display:none}}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><div style="color:var(--muted);font-size:.85rem">Loading dashboard…</div></div>

<div class="layout" id="app" style="display:none">
  <aside class="sidebar">
    <div class="sb-logo">Adwik<span>Flow</span><small id="sbPlan">✦ Active</small></div>
    <div class="nav-sec">Overview</div>
    <a class="nav-item active" href="#"><span class="ic">🏠</span> <span>Dashboard</span></a>
    <div class="nav-sec">Services</div>
    <div id="navServices"></div>
    <div class="sb-bottom">
      <div class="user-pill"><div class="user-av" id="userAv">U</div><div><div class="u-name" id="userName">User</div><div class="u-plan" id="userPlan">—</div></div></div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="welcome" id="welcome">Welcome back! 👋</div>
    <div class="welcome-sub" id="welcomeSub">Manage your subscribed services below.</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Total Leads</div><div class="kpi-val" id="kpiLeads">—</div><div class="kpi-sub">auto-captured</div></div>
      <div class="kpi"><div class="kpi-lbl">🔥 Hot Leads</div><div class="kpi-val" id="kpiHot">—</div><div class="kpi-sub">score 70+</div></div>
      <div class="kpi"><div class="kpi-lbl">✅ Deals Closed</div><div class="kpi-val" id="kpiClosed">—</div><div class="kpi-sub">won</div></div>
      <div class="kpi"><div class="kpi-lbl">📦 Active Services</div><div class="kpi-val" id="kpiSvc">—</div><div class="kpi-sub">subscribed</div></div>
    </div>

    <div class="sec-title">Your Services</div>
    <div class="svc-grid" id="svcGrid"></div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://jytgogooniceczmukjyy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sYReBaX4jW9Vgzfut0ZVxw_TYmMif41';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Service catalog — feature key maps to page + meta
const SERVICES = [
  { key:'leads',    name:'Leads & CRM',        desc:'Track leads, scores, team performance & follow-ups.', icon:'👥', bg:'rgba(0,229,160,.12)',  page:'dashboard.html' },
  { key:'website',  name:'Website Builder',    desc:'Build & publish multi-page websites with live preview.', icon:'🌐', bg:'rgba(91,95,255,.14)',  page:'builder.html' },
  { key:'chatbot',  name:'AI Agent',           desc:'24/7 AI that replies to WhatsApp, Email & SMS.', icon:'🤖', bg:'rgba(162,89,255,.14)', page:null },
  { key:'reviews',  name:'Reviews',            desc:'Collect & monitor Google reviews automatically.', icon:'⭐', bg:'rgba(255,185,48,.1)',  page:null },
];

let company=null, activeFeatures=new Set();

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ window.location.href='index.html'; return; }

  const { data:comp } = await sb.from('companies').select('*').eq('owner_id', session.user.id).maybeSingle();
  if(!comp){ document.getElementById('loading').innerHTML='<div style="color:var(--muted)">No workspace found. <a href="index.html" style="color:var(--accent)">Go back</a></div>'; return; }
  company=comp;

  document.getElementById('userName').textContent=comp.name||'User';
  document.getElementById('userAv').textContent=(comp.name||'U')[0].toUpperCase();
  document.getElementById('welcome').textContent='Welcome back, '+(comp.name||'there')+'! 👋';

  // load active subscriptions
  const { data:subs } = await sb.from('subscriptions').select('feature,status').eq('company_id', comp.id).eq('status','active');
  (subs||[]).forEach(s=>activeFeatures.add(s.feature));

  // stats
  const [ld] = await Promise.all([
    sb.from('leads').select('status,priority').eq('company_id', comp.id)
  ]);
  const leads = ld.data || [];
  document.getElementById('kpiLeads').textContent = leads.length;
  document.getElementById('kpiHot').textContent = leads.filter(l=>l.priority==='hot').length;
  document.getElementById('kpiClosed').textContent = leads.filter(l=>l.status==='closed').length;
  document.getElementById('kpiSvc').textContent = activeFeatures.size;

  const planNames = SERVICES.filter(s=>activeFeatures.has(s.key)).map(s=>s.name);
  document.getElementById('userPlan').textContent = planNames.length ? planNames.length+' active' : 'No plan';

  renderSidebar();
  renderCards();

  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
}

function renderSidebar(){
  document.getElementById('navServices').innerHTML = SERVICES.map(s=>{
    const on = activeFeatures.has(s.key);
    if(on && s.page){
      return `<a class="nav-item" href="${s.page}"><span class="ic">${s.icon}</span> <span>${s.name}</span> <span class="badge-r b-live">On</span></a>`;
    }else if(on && !s.page){
      return `<a class="nav-item" href="#" onclick="soon(event,'${s.name}')"><span class="ic">${s.icon}</span> <span>${s.name}</span> <span class="badge-r b-live">Soon</span></a>`;
    }else{
      return `<a class="nav-item lockednav" href="#" onclick="lockMsg(event,'${s.name}')"><span class="ic">${s.icon}</span> <span>${s.name}</span> <span class="badge-r b-lock">🔒</span></a>`;
    }
  }).join('');
}

function renderCards(){
  document.getElementById('svcGrid').innerHTML = SERVICES.map(s=>{
    const on = activeFeatures.has(s.key);
    if(on && s.page){
      return `<a class="svc-card unlocked" href="${s.page}">
        <span class="svc-tag tag-active">Active</span>
        <div class="svc-ic" style="background:${s.bg}">${s.icon}</div>
        <div class="svc-nm">${s.name}</div>
        <div class="svc-ds">${s.desc}</div>
        <div class="svc-go">Open →</div></a>`;
    }else if(on && !s.page){
      return `<div class="svc-card unlocked" onclick="soon(event,'${s.name}')" style="cursor:pointer">
        <span class="svc-tag tag-active">Active</span>
        <div class="svc-ic" style="background:${s.bg}">${s.icon}</div>
        <div class="svc-nm">${s.name}</div>
        <div class="svc-ds">${s.desc}</div>
        <div class="svc-go">Coming soon →</div></div>`;
    }else{
      return `<div class="svc-card locked">
        <span class="svc-tag tag-lock">🔒 Locked</span>
        <div class="svc-ic" style="background:${s.bg}">${s.icon}</div>
        <div class="svc-nm">${s.name}</div>
        <div class="svc-ds">${s.desc}</div>
        <button class="subscribe-btn" onclick="subscribe('${s.key}','${s.name}')">Subscribe to unlock</button></div>`;
    }
  }).join('');
}

function soon(e,name){ e.preventDefault(); alert(name+' is coming soon! We are building it step by step.'); }
function lockMsg(e,name){ e.preventDefault(); alert('🔒 '+name+' is locked.\n\nSubscribe to this service to unlock it.'); }
function subscribe(key,name){ alert('💳 Subscribe to '+name+'\n\nPayment flow coming soon (Razorpay). For now, subscriptions are added manually.'); }

async function logout(){
  await sb.auth.signOut();
  window.location.href='index.html';
}

init();
</script>
</body>
</html>
