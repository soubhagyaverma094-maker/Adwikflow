
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get in Touch — Getmywebsite.in</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080F;--surface:#0E1020;--card:#131629;--border:rgba(255,255,255,0.08);--accent:#5B5FFF;--accent2:#A259FF;--green:#00E5A0;--red:#FF5C7A;--muted:#7B80A8;--text:#E8EAF6;--grad:linear-gradient(135deg,#5B5FFF,#A259FF)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.2rem;position:relative;overflow-x:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none}
.orb1{width:420px;height:420px;background:rgba(91,95,255,.15);top:-140px;left:-100px}
.orb2{width:340px;height:340px;background:rgba(162,89,255,.12);bottom:-100px;right:-80px}
.box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2.2rem;max-width:440px;width:100%;position:relative;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:#fff;text-align:center;margin-bottom:.3rem}
.logo span{color:var(--accent)}
.tag{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:1.8rem;line-height:1.6}

label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;letter-spacing:.05em}
label .req{color:var(--red)}
input,textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:.7rem 1rem;color:var(--text);font-size:.88rem;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:88px}
.btn{width:100%;background:var(--grad);color:#fff;border:none;padding:.85rem;border-radius:10px;font-weight:700;font-size:.92rem;cursor:pointer;margin-top:.5rem;box-shadow:0 6px 24px rgba(91,95,255,.35);transition:.2s}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.msg{margin-top:1rem;padding:.75rem .95rem;border-radius:9px;font-size:.82rem;line-height:1.5;display:none}
.msg.err{background:rgba(255,92,122,.1);border:1px solid rgba(255,92,122,.3);color:var(--red);display:block}
.privacy{text-align:center;font-size:.72rem;color:var(--muted);margin-top:1.1rem;line-height:1.6}
/* success */
.done{text-align:center;padding:1.5rem 0;display:none}
.done-ic{width:70px;height:70px;background:rgba(0,229,160,.12);border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.2rem;animation:pop .4s ease}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.done-t{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:.5rem}
.done-s{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem;line-height:1.6}
.btn-out{background:var(--card);color:var(--muted);border:1px solid var(--border);padding:.7rem 1.4rem;border-radius:9px;font-weight:600;font-size:.85rem;cursor:pointer}
.btn-out:hover{color:#fff}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>

<div class="box">
  <!-- FORM -->
  <div id="formView">
    <div class="logo">Get<span>mywebsite</span>.in</div>
    <div class="tag">Fill this form and our team will call you back within 10 minutes.</div>

    <div class="fg">
      <label>Full Name <span class="req">*</span></label>
      <input id="f-name" placeholder="Ravi Sharma" autocomplete="name">
    </div>
    <div class="fg">
      <label>Phone / WhatsApp <span class="req">*</span></label>
      <input id="f-phone" type="tel" placeholder="+91 98765 43210" autocomplete="tel">
    </div>
    <div class="fg">
      <label>Email</label>
      <input id="f-email" type="email" placeholder="ravi@email.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>Message</label>
      <textarea id="f-msg" placeholder="Tell us what you need…"></textarea>
    </div>

    <button class="btn" id="btnSubmit" onclick="submitLead()">Send Enquiry →</button>
    <div class="msg" id="msg"></div>
    <div class="privacy">🔒 Your details are safe with us. We never share them.</div>
  </div>

  <!-- SUCCESS -->
  <div class="done" id="doneView">
    <div class="done-ic">✓</div>
    <div class="done-t">Thank you, <span id="doneName">friend</span>!</div>
    <div class="done-s">We've received your enquiry.<br>Our team will call you within 10 minutes.</div>
    <button class="btn-out" onclick="resetForm()">Send another enquiry</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://jytgogooniceczmukjyy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sYReBaX4jW9Vgzfut0ZVxw_TYmMif41';
const COMPANY_ID   = '4763c0f1-9b48-4c41-a85a-21d4b55ea2fe';
// ═══════════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMsg(t){
  const el = document.getElementById('msg');
  el.className = 'msg err';
  el.textContent = t;
}
function hideMsg(){ document.getElementById('msg').className = 'msg'; }

async function submitLead(){
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const note  = document.getElementById('f-msg').value.trim();

  if(!name){  showMsg('Please enter your name.'); return; }
  if(!phone){ showMsg('Please enter your phone number.'); return; }
  if(phone.replace(/\D/g,'').length < 10){ showMsg('Please enter a valid phone number.'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  hideMsg();

  const { error } = await sb.from('leads').insert({
    company_id: COMPANY_ID,
    name, phone,
    email: email || null,
    source: 'Website',
    status: 'notpicked',
    note: note || 'Website form enquiry',
  });

  if(error){
    btn.disabled = false;
    btn.textContent = 'Send Enquiry →';
    showMsg('Something went wrong. Please try again or call us directly.');
    console.error(error);
    return;
  }

  document.getElementById('doneName').textContent = name.split(' ')[0];
  document.getElementById('formView').style.display = 'none';
  document.getElementById('doneView').style.display = 'block';
}

function resetForm(){
  ['f-name','f-phone','f-email','f-msg'].forEach(id => document.getElementById(id).value = '');
  const btn = document.getElementById('btnSubmit');
  btn.disabled = false;
  btn.textContent = 'Send Enquiry →';
  hideMsg();
  document.getElementById('formView').style.display = 'block';
  document.getElementById('doneView').style.display = 'none';
}

// Enter key submits
document.getElementById('f-phone').addEventListener('keydown', e => { if(e.key==='Enter') submitLead(); });
</script>
</body>
</html>
